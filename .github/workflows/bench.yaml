name: Bench

# Automated benchmark gate (issue #156, phase 2).
#
# Triggers:
# - pull_request touching Sources/** or this workflow: compare against the
#   target branch's latest baseline artifact if one exists.
# - push to main: establish/update the baseline-benchmark.json artifact.
# - workflow_dispatch: ad-hoc runs with URL inputs (legacy manual mode).
#
# All workflow inputs reach shell commands via env vars only — never via
# ${{ … }} interpolation inside run: scripts. That keeps untrusted strings
# from being parsed by the shell.

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'Sources/**'
      - '.github/workflows/bench.yaml'
  workflow_dispatch:
    inputs:
      frames:
        description: "Measured frame count"
        required: false
        default: "500"
      warmup:
        description: "Warm-up frame count"
        required: false
        default: "30"
      mode:
        description: "Benchmark mode (render, animation, transforms, load)"
        required: false
        default: "render"
      vrm_url:
        description: "Optional URL to a VRM/GLB sample. If omitted, the job exits early with a note."
        required: false
        default: ""
      vrma_url:
        description: "Optional URL to a VRMA animation file (recommended for render mode)."
        required: false
        default: ""
      label:
        description: "Tag printed in the report header and JSON envelope"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  bench:
    name: Run VRMBenchmark
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.2
        run: |
          XCODE=$(ls -d /Applications/Xcode_26* /Applications/Xcode_27* 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26 (or newer) found"
            ls /Applications | grep -i Xcode || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Compile shaders
        run: make shaders

      - name: Build VRMBenchmark (release)
        run: swift build -c release --product VRMBenchmark

      - name: Determine benchmark inputs
        id: inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_FRAMES: ${{ github.event.inputs.frames }}
          INPUT_WARMUP: ${{ github.event.inputs.warmup }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_LABEL: ${{ github.event.inputs.label }}
          INPUT_VRM_URL: ${{ github.event.inputs.vrm_url }}
          INPUT_VRMA_URL: ${{ github.event.inputs.vrma_url }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .bench-assets .bench-out

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_VRM_URL" ]; then
              echo "::warning::No vrm_url input — skipping the run. Re-trigger with a vrm_url to collect a sample."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            curl -fsSL --max-time 120 "$INPUT_VRM_URL" -o .bench-assets/sample.vrm
            if [ -n "$INPUT_VRMA_URL" ]; then
              curl -fsSL --max-time 120 "$INPUT_VRMA_URL" -o .bench-assets/sample.vrma
              echo "vrma_path=.bench-assets/sample.vrma" >> "$GITHUB_OUTPUT"
            fi
            echo "vrm_path=.bench-assets/sample.vrm" >> "$GITHUB_OUTPUT"
            if [ -n "$INPUT_FRAMES" ]; then
              echo "frames=$INPUT_FRAMES" >> "$GITHUB_OUTPUT"
            else
              echo "frames=500" >> "$GITHUB_OUTPUT"
            fi
            if [ -n "$INPUT_WARMUP" ]; then
              echo "warmup=$INPUT_WARMUP" >> "$GITHUB_OUTPUT"
            else
              echo "warmup=30" >> "$GITHUB_OUTPUT"
            fi
            if [ -n "$INPUT_MODE" ]; then
              echo "mode=$INPUT_MODE" >> "$GITHUB_OUTPUT"
            else
              echo "mode=render" >> "$GITHUB_OUTPUT"
            fi
            if [ -n "$INPUT_LABEL" ]; then
              echo "label=$INPUT_LABEL" >> "$GITHUB_OUTPUT"
            else
              echo "label=ci-$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            fi
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "upload_baseline=false" >> "$GITHUB_OUTPUT"
            echo "compare_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # pull_request and push paths use the committed reference scene.
          echo "vrm_path=AvatarSample_A_1.0.vrm.glb" >> "$GITHUB_OUTPUT"
          echo "vrma_path=VRMA_Locomotion_Pack/Idle.vrma" >> "$GITHUB_OUTPUT"
          echo "frames=300" >> "$GITHUB_OUTPUT"
          echo "warmup=30" >> "$GITHUB_OUTPUT"
          echo "mode=render" >> "$GITHUB_OUTPUT"
          echo "label=ci-$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "push" ]; then
            echo "upload_baseline=true" >> "$GITHUB_OUTPUT"
            echo "compare_baseline=false" >> "$GITHUB_OUTPUT"
          else
            # pull_request
            echo "upload_baseline=false" >> "$GITHUB_OUTPUT"
            echo "compare_baseline=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run benchmark
        if: steps.inputs.outputs.should_run == 'true'
        env:
          VRM_PATH: ${{ steps.inputs.outputs.vrm_path }}
          VRMA_PATH: ${{ steps.inputs.outputs.vrma_path }}
          BENCH_FRAMES: ${{ steps.inputs.outputs.frames }}
          BENCH_WARMUP: ${{ steps.inputs.outputs.warmup }}
          BENCH_MODE: ${{ steps.inputs.outputs.mode }}
          BENCH_LABEL: ${{ steps.inputs.outputs.label }}
        run: |
          set -euo pipefail
          mkdir -p .bench-out
          ARGS=()
          ARGS+=(--mode "$BENCH_MODE")
          ARGS+=(--frames "$BENCH_FRAMES")
          ARGS+=(--warmup "$BENCH_WARMUP")
          ARGS+=(--label "$BENCH_LABEL")
          ARGS+=(--json .bench-out/benchmark.json)
          if [ -n "$VRMA_PATH" ]; then
            ARGS+=(--vrma "$VRMA_PATH")
          fi
          .build/release/VRMBenchmark "$VRM_PATH" "${ARGS[@]}"

      - name: Upload benchmark report
        if: steps.inputs.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: .bench-out/benchmark.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload baseline artifact
        if: steps.inputs.outputs.upload_baseline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: baseline-benchmark.json
          path: .bench-out/benchmark.json
          if-no-files-found: error
          retention-days: 90

      - name: Download baseline from target branch
        id: baseline
        if: steps.inputs.outputs.compare_baseline == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          mkdir -p .bench-out
          RUN_ID=$(gh run list \
            --repo "$BASE_REPO" \
            --branch "$BASE_REF" \
            --workflow "Bench" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' || true)
          if [ -z "${RUN_ID:-}" ]; then
            echo "::notice::No successful baseline run found on $BASE_REPO/$BASE_REF — skipping comparison."
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh run download --repo "$BASE_REPO" "$RUN_ID" --name baseline-benchmark.json --dir .bench-out/baseline; then
            mv .bench-out/baseline/baseline-benchmark.json .bench-out/baseline.json
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Baseline artifact not found in run $RUN_ID — skipping comparison."
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare against baseline
        if: steps.baseline.outputs.has_baseline == 'true'
        env:
          VRM_PATH: ${{ steps.inputs.outputs.vrm_path }}
          VRMA_PATH: ${{ steps.inputs.outputs.vrma_path }}
          BENCH_FRAMES: ${{ steps.inputs.outputs.frames }}
          BENCH_WARMUP: ${{ steps.inputs.outputs.warmup }}
          BENCH_MODE: ${{ steps.inputs.outputs.mode }}
          BENCH_LABEL: ${{ steps.inputs.outputs.label }}
        run: |
          set -euo pipefail
          ARGS=()
          ARGS+=(--mode "$BENCH_MODE")
          ARGS+=(--frames "$BENCH_FRAMES")
          ARGS+=(--warmup "$BENCH_WARMUP")
          ARGS+=(--label "$BENCH_LABEL")
          ARGS+=(--json .bench-out/benchmark.json)
          ARGS+=(--baseline .bench-out/baseline.json)
          if [ -n "$VRMA_PATH" ]; then
            ARGS+=(--vrma "$VRMA_PATH")
          fi
          .build/release/VRMBenchmark "$VRM_PATH" "${ARGS[@]}"
