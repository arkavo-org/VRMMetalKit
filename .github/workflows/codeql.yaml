name: CodeQL (Swift)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  swift:
    name: Analyze (swift)
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe runner toolchains
        run: |
          echo "::group::Installed Xcode versions"
          ls /Applications | grep -i Xcode || true
          echo "::endgroup::"
          echo "::group::Default toolchain"
          xcode-select -p || true
          swift --version || true
          echo "::endgroup::"
          echo "::group::Available SDKs"
          xcodebuild -showsdks 2>&1 || true
          echo "::endgroup::"
          echo "::group::Swift toolchains on disk"
          ls /Library/Developer/Toolchains 2>/dev/null || true
          ls "$HOME/Library/Developer/Toolchains" 2>/dev/null || true
          echo "::endgroup::"

      - name: Select Xcode with Swift 6.2
        run: |
          # Swift 6.2 ships with Xcode 26.x (and any Xcode 27+).
          XCODE=$(ls -d /Applications/Xcode_26* /Applications/Xcode_27* 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26 (or newer) found; Package.swift requires Swift 6.2"
            echo "Available Xcodes:"
            ls /Applications | grep -i Xcode || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          echo "Selected: $XCODE"
          swift --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:swift'
